name: Build 4K POS
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: 4K-POS-v5
        run: npm install --legacy-peer-deps

      - name: Inject extension code secret
        shell: bash
        run: |
          sed -i "s|__EXT_CODE_SECRET__|${{ secrets.EXT_CODE_SECRET }}|g" "4K-POS-v5/license.js"

      - name: Build exe
        working-directory: 4K-POS-v5
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

