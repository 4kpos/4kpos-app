name: Build 4K POS
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: 4K-POS-v5
        run: npm install --legacy-peer-deps

      - name: Bump patch version
        shell: bash
        run: |
          cd 4K-POS-v5
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$NEW';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add package.json
          git commit -m "chore: bump version to $NEW [skip ci]"
          git push
          echo "Version bumped: $CURRENT → $NEW"

      - name: Inject extension code secret
        shell: bash
        run: |
          sed -i "s|__EXT_CODE_SECRET__|${{ secrets.EXT_CODE_SECRET }}|g" "4K-POS-v5/license.js"

      - name: Auto-commit source changes
        shell: bash
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -- 4K-POS-v5/license.js
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-commit build assets [skip ci]"
            git push
          fi

      - name: Build exe
        working-directory: 4K-POS-v5
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

